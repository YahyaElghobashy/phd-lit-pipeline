project:
  title: "Women on Boards: An International Study in Governance and Wealth Creation"
  short_title: "Women on Boards"
  researcher_name: "Dr. Yara Aboubakr"

papers:
  - id: paper_1
    label: "Paper 1: Technology"
    focus: "Technology & Digital Transformation outcomes"
  - id: paper_2
    label: "Paper 2: Sustainability"
    focus: "Environmental Sustainability / ESG outcomes"
  - id: paper_3
    label: "Paper 3: Innovation"
    focus: "Innovation as a mediating pathway"

research_context:
  summary: |
    The research examines how board gender diversity and director characteristics
    (education, experience, busyness, tenure, executive status, time-to-retirement, etc.)
    affect NON-MONETARY wealth creation.
  critical_note: |
    WEALTH ≠ MONEY. The dependent variables are sustainability scores, innovation metrics,
    green patents, R&D efficiency, digital transformation indices — NOT ROA, Tobin's Q,
    or stock returns. Financial measures are controls only.
  databases:
    - name: "BoardEx"
      purpose: "board composition"
    - name: "Thomson Reuters/Refinitiv"
      purpose: "financials, ESG, patents"

key_scholars:
  - name: "Renée Adams"
    key: "Adams"
    context: "methodology"
  - name: "Alice Eagly"
    key: "Eagly"
    context: "social role theory"

theories:
  - "Agency"
  - "Resource Dependence"
  - "Upper Echelons"
  - "Social Role (Eagly)"
  - "Stakeholder"
  - "Critical Mass (Kanter)"
  - "Human Capital"
  - "Institutional"

